io:
  # Input HFET hd5 files, one file per fill
  #input_dir: "/eos/cms/store/group/dpg_bril/comm_bril/2025/physics"
  input_dir: "/cephfs/brilshare/leeja/hf_reprocessed/hfet/25_uncorr"
  beam_dir:  "/eos/cms/store/group/dpg_bril/comm_bril/2025/physics"
  #input_pattern: "{fill}/{fill}_*.hd5"
  input_pattern: "{fill}/{fill}.hd5"

  # Output files, to avoid overwriting the old version
  output_dir: "/cephfs/brilshare/leeja/hf_reprocessed/hfet/25"
  output_pattern: "{fill}/{fill}.hd5"

  # HDF5 node / key with the HF table
  node: "hfetlumi"

  # Precomputed active BX mask (shape=(3564,), dtype=int)
  # Can be produced once from the beam hd5
  active_mask_pattern: "/cephfs/brilshare/alshevel/hf_masks/activeBXMask_fill{fill}.npy"

  # Directory where Type-1 diagnostic plots (etc.) are stored
  type1_dir: "/eos/user/l/leeja/HF/plots_hfpipe/ET/25"

steps:
  revert_online: false
  restore_rates: true
  compute_type1: true
  apply_type1:   true
  bunch_train:   false

afterglow:

  # BX indices to hard-clean (mu_true = 0) – analogue of BX_TO_CLEAN
  bx_to_clean: [3488, 3489, 3490, 3491, 3553, 3554, 3555, 3556, 3557]
  
  #hfsbr_pattern: "/home/leeja/hfpipe/input/afterglow/hfet_10843.txt"
  hfsbr_pattern: "/home/leeja/hfpipe/input/afterglow/hfet_online_Apr13_24.txt"
  
  # Regularization strengths for the LSQ inversion
  lambda_reg: 0.01
  lambda_nonactive: 0.05
  
  n_jobs: 16

  # From your note: sigvis = 3170.19
  # Conversion example: bx = bxraw * 11245.6 / sigvis
  sigvis: 3170.19

type1:
  # Offsets (in BX) between the main bunch and the tail to be fitted
  offsets: [1, 2, 3, 4]

  # Minimum SBIL for including a point in the Type-1 fit
  sbil_min: 0.001

  # Whether to produce Type-1 summary plots
  make_plots: true

  debug: true             # draw "before" Type-1 plots directly in compute_type1_step
  debug_after_apply: true # draw "after" Type-1 plots in apply_type1_step

  # Do not store heavy intermediate type1_{offset}.h5 files
  save_hd5: false

bunch_train:
  # location of data to use as a linear reference for the bunch train effect
  linear_reference: null
  input_pattern: "{fill}/{fill}_*.hd5"
  node: null

  # order of the poly fit to apply
  order: 3

  # Minimum SBIL for including a point in the fit
  sbil_min: 0.1

  make_plots: True
  save_hd5: False

online:
  # for restoring rates from online
  hfsbr: "/home/leeja/hfpipe/input/afterglow/hfet_online_Apr13_24.txt"

  # online type 1
  linear_type1: [0, 0, 0]
  quad_type1: [0, 0, 0]

  # online pedestal table name in ratefile
  # set to null if there is no online pedestal
  pedestal_table: "hfEtPedestal"

fills:
 - 10813
 - 10808
 - 10807
 - 10806
 - 10805
 - 10804
 - 10803
 - 10802
